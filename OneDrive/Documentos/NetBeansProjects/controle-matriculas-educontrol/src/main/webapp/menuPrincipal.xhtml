<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Sistema de Controle de Matrícula</title>
        <h:outputStylesheet name="css/menu.css"/>
    </h:head>

    <h:body>
        <div class="menubar-wrapper">
            <h:form id="frmMenu">
                <p:menubar styleClass="custom-menubar">

                    <p:submenu label="Cadastros">
                        <p:menuitem value="Pessoas"      url="cadastroPessoa.xhtml" />
                        <p:menuitem value="Disciplinas"  url="cadastroDisciplina.xhtml" />
                        <p:menuitem value="Matrículas"   url="cadastroMatricula.xhtml" />
                    </p:submenu>

                    <p:submenu label="Relatórios">
                        <p:menuitem value="Disciplinas por Professor"  url="relatorioDisciplinas.xhtml" />
                        <p:menuitem value="Disciplinas por Aluno"      url="#" />
                        <p:menuitem value="Faturamento por Período"    url="#" />
                    </p:submenu>

                    <p:submenu label="Sistema">
                        <p:menuitem value="Usuários" url="usuario.xhtml" />
                        <p:separator />
                        <p:menuitem value="Sair" action="#{menuBean.sair}" ajax="false" />
                    </p:submenu>

                </p:menubar>
            </h:form>
        </div>

        <div class="main-content"></div>
    </h:body>
</html>

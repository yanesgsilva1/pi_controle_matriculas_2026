<?xml version="1.0" encoding="UTF-8"?>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Educontrol - Sistema de Controle de Matrículas</title>
        <h:outputStylesheet name="css/login.css"/>
    </h:head>
    <h:body>
        <div class="page-container">
            <!-- Cabeçalho na parte azul -->
            <div class="header">
                <h1>EduControl</h1>
                <h3>Sistema de Controle de Matrículas</h3>
            </div>
            <div class="login-box">
                <h2>Acessar Sistema</h2>
                <br/>

                <h:form id="loginForm">
                    <!-- Usuário -->
                    <h:outputLabel for="usuario" value="Usuário:" />
                    <p:inputText id="usuario" value="#{loginBean.usuario}" required="true"
                                 requiredMessage="O campo Usuário deve ser preenchido." />
                    <p:message for="usuario" display="text" />
                    <br/>

                    <!-- Senha -->
                    <h:outputLabel for="senha" value="Senha:" />
                    <p:password id="senha" value="#{loginBean.senha}" required="true"
                                requiredMessage="O campo Senha deve ser preenchido." />
                    <p:message for="senha" display="text" />
                    <br/><br/>

                    <!-- Botões -->
                    <p:commandButton value="Entrar" action="#{loginBean.login}" update="loginForm" styleClass="btn btn-green" />
                    <!--<p:commandButton value="Cadastrar" action="#{loginBean.cadastrar}" styleClass="btn btn-blue" />
                    <p:commandButton value="Sair" action="#{loginBean.sair}" styleClass="btn btn-red" />-->

                    <!-- Mensagens globais -->
                    <p:messages id="globalMsg" globalOnly="true" showDetail="true" closable="true" />
                </h:form>
                <br/>

                <p>Dica: Use admin/admin para teste.</p>
            </div>
        </div>
    </h:body>
</html>

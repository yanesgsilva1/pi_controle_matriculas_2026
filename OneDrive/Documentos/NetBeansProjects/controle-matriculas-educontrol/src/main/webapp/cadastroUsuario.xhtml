<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>EduControl - Cadastro de Usuário</title>
</h:head>

<h:body>
    <h:form id="formCadastro">
        <p:messages id="messages" showDetail="true" closable="true" />

        <p:panel header="Novo Usuário (Requisito ID 02)">
            <h:panelGrid columns="2" cellpadding="5">

                <p:outputLabel for="login" value="Login (E-mail):" />
                <p:inputText id="login" value="#{usuarioBean.usuario.login}" required="true" />

                <p:outputLabel for="senha" value="Senha:" />
                <p:password id="senha" value="#{usuarioBean.usuario.senha}" required="true" feedback="true" />

                <p:commandButton value="Cadastrar"
                                 action="#{usuarioBean.salvar}"
                                 update="messages" />
            </h:panelGrid>
        </p:panel>
    </h:form>
</h:body>
</html>

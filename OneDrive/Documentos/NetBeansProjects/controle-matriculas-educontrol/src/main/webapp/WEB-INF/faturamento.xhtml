<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Controle de Faturamento</title>
    </h:head>
    <h:body>
        <h:form id="formFaturamento">
            <h1>Gestão de Mensalidades</h1>
            
<p:panelGrid columns="2" style="margin-bottom: 20px; width: 300px">
    <h:outputText value="Total a Receber:" style="font-weight: bold;" />
    <h:outputText value="#{faturamentoBean.totalPendente}" id="totalGeral">
        <f:convertNumber type="currency" currencySymbol="R$" />
    </h:outputText>
</p:panelGrid>
            
            <p:dataTable value="#{faturamentoBean.listaFaturas}" var="fatura" id="tabelaFaturas">
                <p:column headerText="ID">
                    <h:outputText value="#{fatura.id}" />
                </p:column>
                
                <p:column headerText="Aluno">
                    <h:outputText value="#{fatura.alunoNome}" />
                </p:column>
                
                <p:column headerText="Valor">
                    <h:outputText value="#{fatura.valor}">
                        <f:convertNumber type="currency" currencySymbol="R$" />
                    </h:outputText>
                </p:column>
                
                <p:column headerText="Status">
                    <h:outputText value="#{fatura.status}" 
                                  style="font-weight: bold; color: #{fatura.status eq 'PAGO' ? 'green' : 'red'}" />
                </p:column>
                
                <p:column headerText="Ação">
                    <p:commandButton 
                        value="Dar Baixa" 
                        action="#{faturamentoBean.darBaixa(fatura)}" 
                        update="@form" 
                        disabled="#{fatura.status eq 'PAGO'}" />
                </p:column>
            </p:dataTable>
        </h:form>
    </h:body>
</html>
